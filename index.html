<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uruguayn - Canal Infantil</title><style>
    body {
        margin: 0;
        font-family: Comic Sans MS, Arial, sans-serif;
        background-color: white;
        overflow-x: hidden;
    }

    /* Círculos decorativos */
    .circle {
        position: fixed;
        width: 120px;
        height: 120px;
        background-color: #4da6ff;
        border-radius: 50%;
        opacity: 0.2;
        z-index: -1;
    }

    .left { left: -60px; }
    .right { right: -60px; }

    .c1 { top: 100px; }
    .c2 { top: 300px; }
    .c3 { top: 500px; }

    /* Navegação */
    .nav {
        background-image: url('SUA_IMAGEM_DE_NAVEGACAO_AQUI');
        background-size: cover;
        padding: 20px;
        text-align: center;
    }

    .nav a {
        display: inline-block;
        margin: 10px;
        padding: 10px 20px;
        background: #4da6ff;
        color: white;
        text-decoration: none;
        border-radius: 10px;
        font-weight: bold;
    }

    .nav a:hover {
        background: #1e90ff;
    }

    /* Container */
    .container {
        max-width: 1000px;
        margin: auto;
        padding: 20px;
        text-align: center;
    }

    /* TV */
    .tv {
        margin: 30px auto;
    }

    .tv img {
        max-width: 100%;
    }

    /* Programação */
    .schedule img {
        width: 100%;
        max-width: 800px;
    }

    /* Lista de desenhos */
    .shows {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
    }

    .show {
        width: 180px;
        background: #f0f8ff;
        border-radius: 15px;
        padding: 10px;
        box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
    }

    .show img {
        width: 100%;
        border-radius: 10px;
    }

    .show h3 {
        font-size: 16px;
    }

    /* Página de desenho */
    .show-page {
        display: none;
        padding: 20px;
    }

    footer {
        margin-top: 40px;
        padding: 20px;
        background: #4da6ff;
        color: white;
    }
</style></head><body><!-- Círculos --><div class="circle left c1"></div>
<div class="circle left c2"></div>
<div class="circle left c3"></div><div class="circle right c1"></div>
<div class="circle right c2"></div>
<div class="circle right c3"></div><!-- Navegação --><div class="nav">
    <a href="#">BOTÃO 1</a>
    <a href="#">BOTÃO 2</a>
    <a href="#">BOTÃO 3</a>
    <a href="#">BOTÃO 4</a>
</div><!-- Conteúdo principal --><div class="container"><!-- TV -->
<div class="tv">
    <img src="SUA_IMAGEM_DA_TV_AQUI" alt="TV">
</div>

<!-- Programação -->
<div class="schedule">
    <h2>Grade de Programação</h2>
    <img src="SUA_IMAGEM_DA_PROGRAMACAO_AQUI" alt="Programação">
</div>

<!-- Desenhos -->
<h2>Desenhos</h2>
<div class="shows">

    <!-- EXEMPLO DE DESENHO -->
    <div class="show">
        <img src="IMAGEM_DO_DESENHO_AQUI" alt="Desenho">
        <h3>TÍTULO DO DESENHO</h3>
        <button onclick="openShow('show1')">Ver mais</button>
    </div>

</div>

</div><!-- Página interna do desenho --><div id="show1" class="show-page">
    <h1>TÍTULO DO DESENHO</h1>
    <p>DESCRIÇÃO PERSONALIZADA</p><h3>Horários</h3>
<p>VOCÊ PERSONALIZA AQUI</p>

<h3>Semana</h3>
<p>VOCÊ PERSONALIZA AQUI</p>

<button onclick="closeShow('show1')">Voltar</button>

</div><footer>
    <p>© Uruguayn - Canal Infantil</p>
</footer><script>
function openShow(id) {
    document.querySelector('.container').style.display = 'none';
    document.getElementById(id).style.display = 'block';
}

function closeShow(id) {
    document.querySelector('.container').style.display = 'block';
    document.getElementById(id).style.display = 'none';
}
</script></body>
</html>
